<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="main-nav">
        <div class="logo" data-lang-key="logo"></div>
        <ul>
            <li><a href="index.html" data-lang-key="navHome"></a></li>
            <li><a href="publications.html" data-lang-key="navPubs"></a></li>
            <li><a href="blog.html" class="active" data-lang-key="navBlog"></a></li>
            <li class="lang-switcher">
                <a href="#" class="lang-btn" data-lang-switch="en">EN</a>
                <span>/</span>
                <a href="#" class="lang-btn" data-lang-switch="zh">ZH</a>
            </li>
        </ul>
    </nav>

    <div class="container">

        <section>
            <h1 class="page-title" data-lang-key="blogPageTitle"></h1>
            <div class="blog-grid">
                <div class="blog-card">
                    <div class="blog-card-content">
                        <h3><a href="#" data-lang-key="blog1Title"></a></h3>
                        <p class="date" data-lang-key="blog1Date"></p>
                        <p data-lang-key="blog1Desc"></p>
                        <a href="#" class="read-more" data-lang-key="readMore"></a>
                    </div>
                </div>
                <div class="blog-card">
                    <div class="blog-card-content">
                        <h3><a href="#" data-lang-key="blog2Title"></a></h3>
                        <p class="date" data-lang-key="blog2Date"></p>
                        <p data-lang-key="blog2Desc"></p>
                        <a href="#" class="read-more" data-lang-key="readMore"></a>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="page-title" data-lang-key="lifeTitle"></h2>
            <div class="photo-wall">
                <div class="photo-item"><img src="assets/photo1.jpg" alt="Photo 1"></div>
                <div class="photo-item"><img src="assets/photo2.jpg" alt="Photo 2"></div>
                <div class="photo-item"><img src="assets/photo3.jpg" alt="Photo 3"></div>
                <div class="photo-item"><img src="assets/photo4.jpg" alt="Photo 4"></div>
                <div class="photo-item"><img src="assets/photo5.jpg" alt="Photo 5"></div>
                <div class="photo-item"><img src="assets/photo6.jpg" alt="Photo 6"></div>
            </div>
        </section>

    </div>

    <script src="translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const langSwitcher = document.querySelector('.lang-switcher');
            let currentLang = localStorage.getItem('lang') || 'en';

            const setLanguage = (lang) => {
                currentLang = lang;
                localStorage.setItem('lang', lang);
                document.documentElement.lang = lang;

                document.querySelectorAll('[data-lang-key]').forEach(el => {
                    const key = el.getAttribute('data-lang-key');
                    if (translations[lang] && translations[lang][key]) {
                        el.innerHTML = translations[lang][key];
                    }
                });
                document.title = translations[lang].blogTitle;
            };

            langSwitcher.addEventListener('click', (e) => {
                e.preventDefault();
                const lang = e.target.getAttribute('data-lang-switch');
                if (lang && lang !== currentLang) {
                    setLanguage(lang);
                }
            });

            setLanguage(currentLang);
        });
    </script>
</body>

</html>
